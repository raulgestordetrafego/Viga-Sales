##############################################################
#  Nginx config — vigasales.com.br (Landing Page)
#  Salvar em: /etc/nginx/sites-available/vigasales.com.br
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name vigasales.com.br www.vigasales.com.br;

    # Redireciona para HTTPS (ativo após certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vigasales.com.br www.vigasales.com.br;

    # Arquivos do site
    root /var/www/vigasales;
    index landing.html index.html;

    # SSL — gerado pelo Certbot (não editar manualmente)
    # ssl_certificate     /etc/letsencrypt/live/vigasales.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vigasales.com.br/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip para performance
    gzip on;
    gzip_types text/html text/css application/javascript text/javascript;
    gzip_min_length 1024;

    # Cache de assets estáticos
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Landing page principal
    location / {
        try_files $uri $uri/ /landing.html;
    }

    # Segurança básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
}
