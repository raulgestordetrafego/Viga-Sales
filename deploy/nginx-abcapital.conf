##############################################################
#  Nginx config — AB Capital
#  Landing page: abcapital.com.br
#  CRM:          app.abcapital.com.br
#
#  Após deploy: certbot --nginx -d abcapital.com.br -d www.abcapital.com.br -d app.abcapital.com.br
##############################################################

# ── Landing page (abcapital.com.br) ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name abcapital.com.br www.abcapital.com.br;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Captura de leads da landing → proxy para o Node
    location /api/ab-capital/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Landing page servida pelo Node
    location / {
        proxy_pass         http://127.0.0.1:3000/landing;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── CRM (app.abcapital.com.br) ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.abcapital.com.br;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    client_max_body_size 50M;

    # CRM SPA
    location / {
        proxy_pass         http://127.0.0.1:3000/abcapital/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # API
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
