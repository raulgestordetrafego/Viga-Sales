##############################################################
#  Nginx config — AB Capital
#  Landing page: abcapital.com.br  → landing.html
#  CRM:          app.abcapital.com.br → /abcapital (Node :3000)
#
#  Salvar em: /etc/nginx/sites-available/abcapital
#  Ativar:    ln -s /etc/nginx/sites-available/abcapital /etc/nginx/sites-enabled/
#  SSL:       certbot --nginx -d abcapital.com.br -d www.abcapital.com.br -d app.abcapital.com.br
##############################################################

# ── Landing page (abcapital.com.br) ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name abcapital.com.br www.abcapital.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name abcapital.com.br www.abcapital.com.br;

    # SSL — gerado pelo Certbot
    # ssl_certificate     /etc/letsencrypt/live/abcapital.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/abcapital.com.br/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/html text/css application/javascript text/javascript;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Captura de leads da landing → proxy para o Node
    location /api/ab-capital/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Todo o resto → landing.html servida pelo Node
    location / {
        proxy_pass         http://127.0.0.1:3000/landing;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── CRM (app.abcapital.com.br) ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.abcapital.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.abcapital.com.br;

    # SSL — gerado pelo Certbot
    # ssl_certificate     /etc/letsencrypt/live/abcapital.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/abcapital.com.br/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/html text/css application/javascript text/javascript application/json;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    client_max_body_size 50M;

    # Proxy tudo para o Node (que serve /abcapital/* e /api/ab-capital/*)
    location / {
        proxy_pass         http://127.0.0.1:3000/abcapital/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
