<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AB Capital — CRM</title>
<style>
  :root {
    --bg: #091929;
    --surface: #0e2540;
    --surface2: #153354;
    --border: #1e3d63;
    --accent: #c9a227;
    --accent2: #e8c04a;
    --text: #edf1f7;
    --muted: #7fa8cc;
    --danger: #ef4444;
    --success: #22c55e;
    --info: #3b82f6;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  button { cursor: pointer; border: none; outline: none; font-family: inherit; }
  input, select, textarea { font-family: inherit; }

  /* Login */
  #login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .brand { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .login-logo .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .login-card h2 { font-size: 20px; margin-bottom: 24px; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }

  /* Form */
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; transition: border .2s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Toggle switch */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: .2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }
  .toggle-danger input:checked + .toggle-slider { background: var(--danger); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: .85; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .btn-full { width: 100%; justify-content: center; }

  /* Layout */
  #app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .brand { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .sidebar-logo .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; font-size: 14px; color: var(--muted); cursor: pointer; transition: all .2s; border-left: 3px solid transparent; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); background: var(--surface2); border-left-color: var(--accent); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #0f1117; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-role { font-size: 11px; color: var(--muted); text-transform: uppercase; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .page { flex: 1; overflow-y: auto; padding: 24px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-card.danger { border-color: #7f1d1d; background: #1a0808; }
  .stat-card.success { border-color: #14532d; background: #081a0e; }
  .stat-card.warning { border-color: #78350f; background: #1a1008; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.success { color: var(--success); }
  .stat-value.warning { color: var(--warning); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Progress bar */
  .progress-wrap { margin-top: 12px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .5s; }
  .progress-fill.over { background: var(--success); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-toolbar { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; flex: 1; min-width: 180px; }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .pagination { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }

  /* Badge */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

  /* Kanban */
  .kanban { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; height: calc(100vh - 124px); }
  .kanban-col { flex: 0 0 260px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
  .kanban-col-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .kanban-col-title { font-size: 13px; font-weight: 600; }
  .kanban-col-count { font-size: 12px; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
  .kanban-items { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
  .kanban-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: grab; transition: border-color .2s, opacity .2s; }
  .kanban-card:hover { border-color: var(--accent); }
  .kanban-card.dragging { opacity: .4; cursor: grabbing; }
  .kanban-card.atraso { border-left: 3px solid var(--danger) !important; background: #1a0808; }
  .kanban-card.cancelado { opacity: .5; border-style: dashed; }
  .kanban-col.drag-over { background: rgba(201,162,39,.08); outline: 2px dashed var(--accent); outline-offset: -4px; }
  .kanban-card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .kanban-card-phone { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .kanban-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .kanban-tag { background: var(--surface2); border-radius: 4px; padding: 2px 6px; font-size: 11px; color: var(--muted); }
  .kanban-tag.danger { background: #450a0a; color: #f87171; }

  /* Stage progress bar */
  .stage-bar { display: flex; gap: 3px; margin: 8px 0; }
  .stage-step { flex: 1; height: 5px; border-radius: 3px; background: var(--border); }
  .stage-step.done { background: var(--accent); }
  .stage-step.won { background: var(--success); }
  .stage-step.lost { background: var(--danger); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 640px; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-lg { max-width: 860px; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }

  /* Section title inside modal */
  .section-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-top: 4px; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast-item { padding: 12px 18px; border-radius: 10px; font-size: 14px; animation: slideIn .3s ease; max-width: 320px; }
  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  .toast-success { background: #14532d; color: #4ade80; border: 1px solid #166534; }
  .toast-error   { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
  .toast-info    { background: #1e3a5f; color: #60a5fa; border: 1px solid #1d4ed8; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
  }
  .hidden { display: none !important; }
  .loading { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  .empty { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  select option { background: var(--surface); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- Login -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="AB Capital" style="height:56px;object-fit:contain">
    </div>
    <h2>Entrar</h2>
    <div class="form-field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="username" />
    </div>
    <div class="form-field">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div id="login-error" class="error-msg"></div>
    <button class="btn btn-primary btn-full" style="margin-top:20px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="logo.png" alt="AB Capital" style="height:36px;object-fit:contain;display:block">
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="leads" onclick="navigate('leads')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads
      </div>
      <div class="nav-item" data-page="pipeline" onclick="navigate('pipeline')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Pipeline
      </div>
      <div class="nav-item" data-page="prospects" onclick="navigate('prospects')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Prospecção
      </div>
      <div class="nav-item" data-page="users" onclick="navigate('users')" id="nav-users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Usuários
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%;justify-content:center" onclick="openChangePassword()">Trocar senha</button>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px;width:100%;justify-content:center" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="topbar-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </div>
    <div class="page" id="page-dashboard"></div>
    <div class="page hidden" id="page-leads"></div>
    <div class="page hidden" id="page-pipeline"></div>
    <div class="page hidden" id="page-prospects"></div>
    <div class="page hidden" id="page-users"></div>
  </div>
</div>

<div id="modal-container"></div>

<script>
// ── Constantes ────────────────────────────────────────────────────────────────
const STAGES = [
  { id: 'analise',          label: 'Análise',          color: '#60a5fa' },
  { id: 'qualificacao',     label: 'Qualificação',     color: '#a78bfa' },
  { id: 'reuniao_agendada', label: 'Reunião Agendada', color: '#fbbf24' },
  { id: 'ganho',            label: 'Ganho',            color: '#4ade80' },
  { id: 'perdido',          label: 'Perdido',          color: '#f87171' },
];
const STAGE_MAP = Object.fromEntries(STAGES.map(s => [s.id, s]));
const TRAFFIC_SOURCES = ['Instagram','Facebook','Google','Indicação','WhatsApp','Site','TikTok','YouTube','Outro'];
const ADMINISTRADORAS = [
  'Embracon','Porto Seguro Consórcios','Rodobens Consórcios',
  'Caixa Consórcios','Bradesco Consórcios','Itaú Consórcios',
  'Santander Consórcios','BB Consórcios','Sicredi Consórcios',
  'Ademicon','Consorcamp','Midway Consórcios','Minasul','Outra',
];

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('ab_token') || null,
  user:  JSON.parse(localStorage.getItem('ab_user') || 'null'),
  page:  'dashboard',
};

// ── API ───────────────────────────────────────────────────────────────────────
const API = '/api/ab-capital';

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: 'Bearer ' + state.token } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { doLogout(); return null; }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

async function apiUpload(path, formData) {
  const res = await fetch(API + path, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + state.token },
    body: formData,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erro no upload');
  return data;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const data = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    }).then(r => r.json());
    if (!data.token) { errEl.textContent = data.error || 'Erro ao entrar'; return; }
    state.token = data.token;
    state.user  = data.user;
    localStorage.setItem('ab_token', data.token);
    localStorage.setItem('ab_user', JSON.stringify(data.user));
    showApp();
  } catch (e) { errEl.textContent = e.message; }
}

function openChangePassword() {
  const mc = document.getElementById('modal-container');
  mc.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
      <div class="modal" style="max-width:400px">
        <div class="modal-header">
          <span class="modal-title">Trocar senha</span>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-field"><label>Senha atual</label><input type="password" id="cp-current" placeholder="••••••••" /></div>
          <div class="form-field"><label>Nova senha</label><input type="password" id="cp-new" placeholder="••••••••" /></div>
          <div class="form-field"><label>Confirmar nova senha</label><input type="password" id="cp-confirm" placeholder="••••••••" /></div>
          <div id="cp-error" style="color:var(--danger);font-size:13px;margin-top:4px"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
          <button class="btn btn-primary" onclick="submitChangePassword()">Salvar</button>
        </div>
      </div>
    </div>`;
}

async function submitChangePassword() {
  const current = document.getElementById('cp-current').value;
  const newPwd  = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  const errEl   = document.getElementById('cp-error');
  if (newPwd !== confirm) { errEl.textContent = 'As senhas não coincidem'; return; }
  try {
    await api('POST', '/auth/change-password', { currentPassword: current, newPassword: newPwd });
    document.querySelector('.modal-overlay').remove();
    toast('Senha alterada com sucesso!');
  } catch (e) { errEl.textContent = e.message; }
}

function doLogout() {
  state.token = null; state.user = null;
  localStorage.removeItem('ab_token'); localStorage.removeItem('ab_user');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  const u = state.user;
  document.getElementById('user-name').textContent    = u.name;
  document.getElementById('user-role').textContent    = u.role;
  document.getElementById('user-avatar').textContent  = (u.name || '?')[0].toUpperCase();
  if (u.role !== 'master' && u.role !== 'admin') document.getElementById('nav-users').classList.add('hidden');
  navigate('dashboard');
}

// ── Navigation ────────────────────────────────────────────────────────────────
const PAGE_TITLES = { dashboard: 'Dashboard', leads: 'Leads', pipeline: 'Pipeline', prospects: 'Prospecção Ativa', users: 'Usuários' };

function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  if (page === 'dashboard') renderDashboard();
  else if (page === 'leads') renderLeads();
  else if (page === 'pipeline') renderPipeline();
  else if (page === 'prospects') renderProspects();
  else if (page === 'users') renderUsers();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function renderDashboard() {

  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const stats = await api('GET', '/leads/stats');

    const fin = stats.financials || {};
    const isMasterAdmin = state.user?.role === 'master' || state.user?.role === 'admin';

    const pctStr   = progress.toFixed(1);

          <div class="stat-value success">${fin.won_count || 0}</div>

        <div class="progress-wrap">

// ── Leads ─────────────────────────────────────────────────────────────────────
let leadsState = { page: 1, search: '', stage: '' };

async function renderLeads() {
  const el = document.getElementById('page-leads');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openNewLead()">+ Novo Lead</button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const params = new URLSearchParams({ page: leadsState.page, limit: 50 });
    if (leadsState.search) params.set('search', leadsState.search);
    if (leadsState.stage)  params.set('stage',  leadsState.stage);
    const data = await api('GET', `/leads?${params}`);
    if (!data) return;

    const rows = data.leads.map(l => {
      const st = STAGE_MAP[l.pipeline_stage] || STAGES[0];
      const avatar = l.photo_path
        ? `<img src="${l.photo_path}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border);flex-shrink:0">`
        : `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:13px;flex-shrink:0">${(l.name||'?')[0].toUpperCase()}</div>`;
      const flags = [
        l.status_atraso ? `<span class="badge" style="background:#450a0a;color:#f87171">Atraso</span>` : '',
        l.status_cancelamento ? `<span class="badge" style="background:#1c1c1c;color:#6b7280">Cancelado</span>` : '',
      ].filter(Boolean).join(' ');
      return `<tr style="cursor:pointer${l.status_atraso ? ';background:#1a0808' : ''}" onclick="openLeadSheet('${l.id}')">
        <td><div style="display:flex;align-items:center;gap:10px">${avatar}<div><strong>${esc(l.name)}</strong>${flags ? '<div style="margin-top:3px">'+flags+'</div>' : ''}</div></div></td>
        <td>${fmt(l.phone)}</td>
        <td>${esc(l.email||'—')}</td>
        <td>${l.consortium_name ? esc(l.consortium_name) : '—'}</td>
        <td>${l.credit_value ? 'R$ '+fmtMoney(l.credit_value) : '—'}</td>
        <td>${l.installment_value ? 'R$ '+fmtMoney(l.installment_value) : '—'}</td>
        <td>${l.admin_company ? esc(l.admin_company) : '—'}</td>
        <td><span class="badge" style="background:${st.color}22;color:${st.color}">${st.label}</span></td>
        <td>${fmtDate(l.created_at)}</td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-box" placeholder="Buscar por nome, telefone..." value="${esc(leadsState.search)}"
            oninput="leadsState.search=this.value;leadsState.page=1;renderLeads()" />
          <select class="search-box" style="max-width:190px" onchange="leadsState.stage=this.value;leadsState.page=1;renderLeads()">
            <option value="">Todos os estágios</option>
            ${STAGES.map(s=>`<option value="${s.id}" ${leadsState.stage===s.id?'selected':''}>${s.label}</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:13px">${data.total} leads</span>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>WhatsApp</th><th>E-mail</th><th>Modalidade</th><th>Crédito</th><th>Parcela</th><th>Administradora</th><th>Estágio</th><th>Criado</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="9" class="empty">Nenhum lead encontrado</td></tr>'}</tbody>
        </table>
        <div class="pagination">
          <span>Página ${data.page} de ${Math.max(1,Math.ceil(data.total/data.limit))}</span>
          <button class="btn btn-ghost btn-sm" onclick="leadsState.page=Math.max(1,leadsState.page-1);renderLeads()" ${data.page<=1?'disabled':''}>← Ant</button>

  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

async function openLeadSheet(id) {
  const lead = await api('GET', `/leads/${id}`);
  if (!lead) return;
  renderLeadSheetModal(lead);
}

function updateCommCalc() {
  const credit = parseFloat(document.getElementById('lf-credit_value')?.value) || 0;
  const pct    = parseFloat(document.getElementById('lf-commission_pct')?.value) || 4;
  const el     = document.getElementById('comm-calc');
  if (!el) return;
  if (credit > 0) {
    el.textContent = `Comissão estimada: R$ ${fmtMoney(credit * pct / 100)}`;
  } else {
    el.textContent = '';
  }
}

async function saveLeadSheet(id) {
  try {
    const g = id => document.getElementById(id)?.value ?? '';
    const chk = id => document.getElementById(id)?.checked ?? false;
    await api('PUT', `/leads/${id}`, {
      name:                g('lf-name'),
      phone:               g('lf-phone'),
      email:               g('lf-email'),
      address:             g('lf-address'),
      consortium_name:     g('lf-consortium_name'),
      credit_value:        g('lf-credit_value')       ? Number(g('lf-credit_value'))       : null,
      installments:        g('lf-installments')       ? Number(g('lf-installments'))       : null,
      installment_value:   g('lf-installment_value')  ? Number(g('lf-installment_value'))  : null,
      admin_profit_pct:    g('lf-admin_profit_pct')   ? Number(g('lf-admin_profit_pct'))   : null,
      admin_company:       g('lf-admin_company'),
      pipeline_stage:      g('lf-pipeline_stage'),
      traffic_source:      g('lf-traffic_source'),
      responsible:         g('lf-responsible'),
      general_info:        g('lf-general_info'),
      notes:               g('lf-notes'),
      objective:           g('lf-objective'),
      grupo:               g('lf-grupo'),
      cota:                g('lf-cota'),
      contrato:            g('lf-contrato'),
      commission_pct:      g('lf-commission_pct') ? Number(g('lf-commission_pct')) : null,
      parcelas_pagas:      g('lf-parcelas_pagas') !== '' ? Number(g('lf-parcelas_pagas')) : null,
      status_atraso:       chk('lf-status_atraso'),
      status_cancelamento: chk('lf-status_cancelamento'),
    });
    toast('Lead salvo!');
    closeModal();
    if (state.page === 'leads') renderLeads();
    else if (state.page === 'pipeline') renderPipeline();
    else if (state.page === 'dashboard') renderDashboard();
  } catch (e) { toast(e.message, 'error'); }
}

async function uploadLeadFile(id, field, input) {
  if (!input.files[0]) return;
  const fd = new FormData();
  fd.append(field, input.files[0]);
  toast('Enviando...', 'info');
  try {
    const updated = await apiUpload(`/leads/${id}/upload`, fd);
    toast('Arquivo enviado!');
    closeModal();
    renderLeadSheetModal(updated);
  } catch (e) { toast(e.message, 'error'); }
}

async function confirmDeleteLead(id) {
  if (!confirm('Excluir este lead?')) return;
  try {
    await api('DELETE', `/leads/${id}`);
    toast('Lead excluído');
    closeModal();
    renderLeads();
  } catch (e) { toast(e.message, 'error'); }
}

// ── Pipeline Kanban ───────────────────────────────────────────────────────────
async function renderPipeline() {
  const el = document.getElementById('page-pipeline');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const all = await api('GET', '/leads?limit=500');
    if (!all) return;

    const byStage = {};
    STAGES.forEach(s => { byStage[s.id] = []; });
    all.leads.forEach(l => {
      const key = byStage[l.pipeline_stage] ? l.pipeline_stage : STAGES[0].id;
      byStage[key].push(l);
    });

    el.innerHTML = `<div class="kanban">` + STAGES.map(s => `
      <div class="kanban-col" data-stage="${s.id}"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="handleKanbanDrop(event,'${s.id}')">
        <div class="kanban-col-header" style="border-top:3px solid ${s.color}">
          <span class="kanban-col-title" style="color:${s.color}">${s.label}</span>
          <span class="kanban-col-count">${byStage[s.id].length}</span>
        </div>
        <div class="kanban-items">
          ${byStage[s.id].map(l => {
            const photo = l.photo_path
              ? `<img src="${l.photo_path}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border);float:right;margin-left:8px">`
              : '';
            return `<div class="kanban-card ${l.status_atraso ? 'atraso' : ''} ${l.status_cancelamento ? 'cancelado' : ''}"
              draggable="true"
              data-id="${l.id}"
              ondragstart="event.dataTransfer.setData('leadId','${l.id}');this.classList.add('dragging')"
              ondragend="this.classList.remove('dragging')"
              onclick="openLeadSheet('${l.id}')">
              ${photo}
              <div class="kanban-card-name">${esc(l.name)}</div>
              <div class="kanban-card-phone">${fmt(l.phone)}</div>
              <div class="kanban-card-tags">
                ${l.status_atraso ? `<span class="kanban-tag danger">⚠ Atraso</span>` : ''}
                ${l.installment_value ? `<span class="kanban-tag">R$ ${fmtMoney(l.installment_value)}/mês</span>` : ''}
                ${l.admin_company ? `<span class="kanban-tag">${esc(l.admin_company)}</span>` : ''}
                ${l.grupo ? `<span class="kanban-tag">G ${esc(l.grupo)}</span>` : ''}
                ${l.traffic_source ? `<span class="kanban-tag">📣 ${esc(l.traffic_source)}</span>` : ''}
              </div>
              ${l.responsible ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">👤 ${esc(l.responsible)}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`).join('') + `</div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

async function handleKanbanDrop(event, targetStage) {
  event.preventDefault();
  const col = event.currentTarget;
  col.classList.remove('drag-over');
  const leadId = event.dataTransfer.getData('leadId');
  if (!leadId) return;
  try {
    await api('PUT', `/leads/${leadId}`, { pipeline_stage: targetStage });
    renderPipeline();
  } catch (e) { toast('Erro ao mover lead: ' + e.message, 'error'); }
}

// ── Prospects ─────────────────────────────────────────────────────────────────
let proState = { page: 1, search: '', status: '' };

async function renderProspects() {
  const el = document.getElementById('page-prospects');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openAddProspect()">+ Adicionar Prospect</button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const params = new URLSearchParams({ page: proState.page, limit: 50 });
    if (proState.search) params.set('search', proState.search);
    if (proState.status) params.set('status', proState.status);
    const data = await api('GET', `/prospects?${params}`);
    if (!data) return;
    const statusLabel = { novo:'Novo', enviado:'Enviado', respondido:'Respondido', agendado:'Agendado', convertido:'Convertido', perdido:'Perdido' };
    const rows = data.prospects.map(p => `
      <tr>
        <td><strong>${esc(p.name||p.company||'—')}</strong><br><span style="font-size:11px;color:var(--muted)">${esc(p.company||'')}</span></td>
        <td>${fmt(p.phone)}</td>
        <td>${esc(p.segment||'—')}</td>
        <td>${esc(p.city||'—')}</td>
        <td><span class="badge" style="background:var(--surface2);color:var(--muted)">${statusLabel[p.status]||p.status}</span></td>
        <td>${fmtDate(p.created_at)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="editProspect('${p.id}','${esc(p.status)}','${esc(p.notes||'')}','${esc(p.ai_message||'')}')">Editar</button></td>
      </tr>`).join('');
    el.innerHTML = `
      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-box" placeholder="Buscar..." value="${esc(proState.search)}"
            oninput="proState.search=this.value;proState.page=1;renderProspects()" />
          <select class="search-box" style="max-width:160px" onchange="proState.status=this.value;proState.page=1;renderProspects()">
            <option value="">Todos</option>
            ${Object.entries(statusLabel).map(([k,v])=>`<option value="${k}" ${proState.status===k?'selected':''}>${v}</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:13px">${data.total} prospects</span>
        </div>
        <table>
          <thead><tr><th>Nome/Empresa</th><th>Telefone</th><th>Segmento</th><th>Cidade</th><th>Status</th><th>Criado</th><th></th></tr></thead>
          <tbody>${rows||'<tr><td colspan="7" class="empty">Nenhum prospect</td></tr>'}</tbody>
        </table>
        <div class="pagination">
          <span>Página ${data.page} de ${Math.max(1,Math.ceil(data.total/data.limit))}</span>
          <button class="btn btn-ghost btn-sm" onclick="proState.page=Math.max(1,proState.page-1);renderProspects()" ${data.page<=1?'disabled':''}>← Ant</button>
          <button class="btn btn-ghost btn-sm" onclick="proState.page++;renderProspects()" ${data.page*data.limit>=data.total?'disabled':''}>Próx →</button>
        </div>
      </div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

function editProspect(id, status, notes, aiMessage) {
  const statusLabel = { novo:'Novo', enviado:'Enviado', respondido:'Respondido', agendado:'Agendado', convertido:'Convertido', perdido:'Perdido' };

      <textarea id="m-notes" rows="3" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical">${esc(notes)}</textarea>

    <div class="form-field"><label>E-mail</label><input id="m-email" type="email" /></div>

function changeUserPassword(id) {
  showModal('Trocar Senha', `
    <div class="form-field"><label>Nova senha</label><input id="m-pwd" type="password" /></div>`,
    async () => {
      await api('PUT', `/users/${id}/password`, { password: document.getElementById('m-pwd').value });

async function toggleUserStatus(id, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
  if (!confirm(`${newStatus === 'inactive' ? 'Desativar' : 'Ativar'} este usuário?`)) return;
  try {
    await api('PUT', `/users/${id}/status`, { status: newStatus });
    toast('Status atualizado!');
    renderUsers();
  } catch (e) { toast(e.message, 'error'); }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(title, bodyHtml, onConfirm) {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${title}</span>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" id="modal-confirm">Salvar</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-confirm').onclick = async () => {
    try { await onConfirm(); closeModal(); }
    catch (e) { toast(e.message, 'error'); }
  };
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(phone) {
  const d = String(phone||'').replace(/\D/g,'');
  if (d.length===11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  if (d.length===10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return phone;
}
function fmtDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('pt-BR') + ' ' + new Date(str).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}
function fmtMoney(val) {
  return Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

if (state.token && state.user) showApp();
