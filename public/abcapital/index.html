<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AB Capital — CRM</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #c9a227;
    --accent2: #e8c04a;
    --text: #e8eaf0;
    --muted: #8891b0;
    --danger: #ef4444;
    --success: #22c55e;
    --info: #3b82f6;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  button { cursor: pointer; border: none; outline: none; font-family: inherit; }
  input, select, textarea { font-family: inherit; }

  /* Login */
  #login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .brand { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .login-logo .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .login-card h2 { font-size: 20px; margin-bottom: 24px; color: var(--text); }
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; transition: border .2s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: .85; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }

  /* Layout */
  #app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .brand { font-size: 20px; font-weight: 700; color: var(--accent); }
  .sidebar-logo .sub { font-size: 11px; color: var(--muted); }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; color: var(--muted); font-size: 14px; border-radius: 8px; margin: 2px 8px; transition: all .15s; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface2); color: var(--accent); }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #0f1117; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-role { font-size: 11px; color: var(--muted); }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .page { flex: 1; padding: 24px; overflow-y: auto; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-title { font-size: 20px; font-weight: 600; }

  /* Cards / Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
  .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-toolbar { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
  .search-box:focus { outline: none; border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { padding: 12px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
  .badge-novo      { background: #1e293b; color: #94a3b8; }
  .badge-contato   { background: #1e3a5f; color: #60a5fa; }
  .badge-proposta  { background: #3b2f00; color: #fbbf24; }
  .badge-ganho     { background: #14532d; color: #4ade80; }
  .badge-perdido   { background: #450a0a; color: #f87171; }
  .badge-enviado   { background: #1e3a5f; color: #60a5fa; }
  .badge-respondido{ background: #14532d; color: #4ade80; }
  .badge-agendado  { background: #3b2f00; color: #fbbf24; }
  .badge-convertido{ background: #1a1042; color: #a78bfa; }

  /* Pagination */
  .pagination { display: flex; align-items: center; gap: 8px; padding: 16px; border-top: 1px solid var(--border); justify-content: flex-end; }
  .pagination span { font-size: 13px; color: var(--muted); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: flex-end; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast-item { padding: 12px 20px; border-radius: 10px; font-size: 14px; animation: slideIn .3s ease; max-width: 320px; }
  .toast-success { background: #14532d; color: #4ade80; border: 1px solid #166534; }
  .toast-error   { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Pipeline kanban */
  .kanban { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
  .kanban-col { min-width: 240px; max-width: 260px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; flex-shrink: 0; }
  .kanban-col-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .kanban-col-title { font-size: 13px; font-weight: 600; }
  .kanban-col-count { font-size: 12px; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
  .kanban-items { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .kanban-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color .2s; }
  .kanban-card:hover { border-color: var(--accent); }
  .kanban-card-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .kanban-card-phone { font-size: 12px; color: var(--muted); }
  .kanban-card-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }

  .hidden { display: none !important; }
  .loading { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  .empty { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  select option { background: var(--surface); }
</style>
</head>
<body>

<!-- Toast container -->
<div id="toast"></div>

<!-- Login -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">AB CAPITAL</div>
      <div class="sub">Plataforma de Gestão</div>
    </div>
    <h2>Entrar</h2>
    <div class="form-field">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" />
    </div>
    <div class="form-field">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <div id="login-error" class="error-msg"></div>
    <button class="btn btn-primary btn-full" style="margin-top:20px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">AB CAPITAL</div>
      <div class="sub">CRM</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="leads" onclick="navigate('leads')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads
      </div>
      <div class="nav-item" data-page="pipeline" onclick="navigate('pipeline')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Pipeline
      </div>
      <div class="nav-item" data-page="prospects" onclick="navigate('prospects')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Prospecção
      </div>
      <div class="nav-item" data-page="users" onclick="navigate('users')" id="nav-users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Usuários
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:12px;width:100%;justify-content:center" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="topbar-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </div>

    <!-- Pages -->
    <div class="page" id="page-dashboard"></div>
    <div class="page hidden" id="page-leads"></div>
    <div class="page hidden" id="page-pipeline"></div>
    <div class="page hidden" id="page-prospects"></div>
    <div class="page hidden" id="page-users"></div>
  </div>
</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('ab_token') || null,
  user: JSON.parse(localStorage.getItem('ab_user') || 'null'),
  page: 'dashboard',
};

// ── API ───────────────────────────────────────────────────────────────────────
const API = '/api/ab-capital';

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(state.token ? { Authorization: 'Bearer ' + state.token } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { doLogout(); return null; }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const data = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    }).then(r => r.json());
    if (!data.token) { errEl.textContent = data.error || 'Erro ao entrar'; return; }
    state.token = data.token;
    state.user = data.user;
    localStorage.setItem('ab_token', data.token);
    localStorage.setItem('ab_user', JSON.stringify(data.user));
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
  }
}

function doLogout() {
  state.token = null;
  state.user = null;
  localStorage.removeItem('ab_token');
  localStorage.removeItem('ab_user');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').style.display = 'flex';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  // User info
  const u = state.user;
  document.getElementById('user-name').textContent = u.name;
  document.getElementById('user-role').textContent = u.role;
  document.getElementById('user-avatar').textContent = (u.name || '?')[0].toUpperCase();
  // Hide users nav if not master/admin
  if (u.role !== 'master' && u.role !== 'admin') {
    document.getElementById('nav-users').classList.add('hidden');
  }
  navigate('dashboard');
}

// Enter key no login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

// ── Navigation ────────────────────────────────────────────────────────────────
const PAGE_TITLES = { dashboard: 'Dashboard', leads: 'Leads', pipeline: 'Pipeline', prospects: 'Prospecção Ativa', users: 'Usuários' };

function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';

  if (page === 'dashboard') renderDashboard();
  else if (page === 'leads') renderLeads();
  else if (page === 'pipeline') renderPipeline();
  else if (page === 'prospects') renderProspects();
  else if (page === 'users') renderUsers();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const stats = await api('GET', '/leads/stats');
    if (!stats) return;
    const stageMap = { novo: 'Novo', contato: 'Contato', proposta: 'Proposta', ganho: 'Ganho', perdido: 'Perdido' };
    const stagesHtml = (stats.stages || []).map(s =>
      `<tr><td>${stageMap[s.pipeline_stage] || s.pipeline_stage}</td><td style="text-align:right;font-weight:600">${s.c}</td></tr>`
    ).join('');
    el.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total de Leads</div>
          <div class="stat-value">${stats.total_leads}</div>
          <div class="stat-sub">capturados pela landing page</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Leads Hoje</div>
          <div class="stat-value">${stats.leads_today}</div>
          <div class="stat-sub">novos contatos</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Prospects</div>
          <div class="stat-value">${stats.total_prospects}</div>
          <div class="stat-sub">prospecção ativa</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="table-wrap">
          <div style="padding:16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px">Leads por Estágio</div>
          <table><thead><tr><th>Estágio</th><th style="text-align:right">Qtd</th></tr></thead>
          <tbody>${stagesHtml || '<tr><td colspan="2" class="empty">Sem dados</td></tr>'}</tbody></table>
        </div>
        <div class="table-wrap">
          <div style="padding:16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px">Acesso Rápido</div>
          <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
            <button class="btn btn-primary" onclick="navigate('leads')">Ver todos os Leads</button>
            <button class="btn btn-ghost" onclick="navigate('prospects')">Prospecção Ativa</button>
            <button class="btn btn-ghost" onclick="navigate('pipeline')">Pipeline de Vendas</button>
          </div>
        </div>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`;
  }
}

// ── Leads ─────────────────────────────────────────────────────────────────────
let leadsState = { page: 1, search: '', stage: '' };

async function renderLeads() {
  const el = document.getElementById('page-leads');
  const tb = document.getElementById('topbar-actions');
  tb.innerHTML = '';
  el.innerHTML = '<div class="loading">Carregando...</div>';

  try {
    const params = new URLSearchParams({ page: leadsState.page, limit: 50 });
    if (leadsState.search) params.set('search', leadsState.search);
    if (leadsState.stage)  params.set('stage', leadsState.stage);
    const data = await api('GET', `/leads?${params}`);
    if (!data) return;

    const stages = ['novo','contato','proposta','ganho','perdido'];
    const stageLabel = { novo:'Novo', contato:'Contato', proposta:'Proposta', ganho:'Ganho', perdido:'Perdido' };
    const badgeClass = { novo:'badge-novo', contato:'badge-contato', proposta:'badge-proposta', ganho:'badge-ganho', perdido:'badge-perdido' };
    const objLabel = { capital:'Capital de giro', imovel:'Imóvel', reforma:'Reforma', quitacao:'Quitação', investimento:'Investimentos', outros:'Outro' };

    const rows = data.leads.map(l => `
      <tr>
        <td><strong>${esc(l.name)}</strong></td>
        <td>${fmt(l.phone)}</td>
        <td>${esc(l.email || '—')}</td>
        <td>${objLabel[l.objective] || l.objective || '—'}</td>
        <td><span class="badge ${badgeClass[l.pipeline_stage] || 'badge-novo'}">${stageLabel[l.pipeline_stage] || l.pipeline_stage}</span></td>
        <td>${fmtDate(l.created_at)}</td>
        <td>
          <select onchange="updateLeadStage('${l.id}', this.value, '${esc(l.notes||'')}')">
            ${stages.map(s => `<option value="${s}" ${l.pipeline_stage===s?'selected':''}>${stageLabel[s]}</option>`).join('')}
          </select>
        </td>
      </tr>`).join('');

    el.innerHTML = `
      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-box" placeholder="Buscar por nome, telefone..." value="${esc(leadsState.search)}"
            oninput="leadsState.search=this.value;leadsState.page=1;renderLeads()" />
          <select class="search-box" style="max-width:160px" onchange="leadsState.stage=this.value;leadsState.page=1;renderLeads()">
            <option value="">Todos os estágios</option>
            ${stages.map(s=>`<option value="${s}" ${leadsState.stage===s?'selected':''}>${stageLabel[s]}</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:13px">${data.total} leads</span>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>WhatsApp</th><th>E-mail</th><th>Objetivo</th><th>Estágio</th><th>Criado</th><th>Mover</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="7" class="empty">Nenhum lead encontrado</td></tr>'}</tbody>
        </table>
        <div class="pagination">
          <span>Página ${data.page} de ${Math.max(1, Math.ceil(data.total/data.limit))}</span>
          <button class="btn btn-ghost btn-sm" onclick="leadsState.page=Math.max(1,leadsState.page-1);renderLeads()" ${data.page<=1?'disabled':''}>← Ant</button>
          <button class="btn btn-ghost btn-sm" onclick="leadsState.page++;renderLeads()" ${data.page*data.limit>=data.total?'disabled':''}>Próx →</button>
        </div>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`;
  }
}

async function updateLeadStage(id, stage, notes) {
  try {
    await api('PUT', `/leads/${id}`, { pipeline_stage: stage, notes });
    toast('Estágio atualizado');
    renderLeads();
  } catch (e) { toast(e.message, 'error'); }
}

// ── Pipeline Kanban ───────────────────────────────────────────────────────────
async function renderPipeline() {
  const el = document.getElementById('page-pipeline');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const STAGES = [
      { id: 'novo',     label: 'Novo',      color: '#64748b' },
      { id: 'contato',  label: 'Contato',   color: '#3b82f6' },
      { id: 'proposta', label: 'Proposta',  color: '#f59e0b' },
      { id: 'ganho',    label: 'Ganho',     color: '#22c55e' },
      { id: 'perdido',  label: 'Perdido',   color: '#ef4444' },
    ];
    const all = await api('GET', '/leads?limit=500');
    if (!all) return;

    const byStage = {};
    STAGES.forEach(s => { byStage[s.id] = []; });
    all.leads.forEach(l => {
      if (byStage[l.pipeline_stage]) byStage[l.pipeline_stage].push(l);
    });

    const objLabel = { capital:'Capital de giro', imovel:'Imóvel', reforma:'Reforma', quitacao:'Quitação', investimento:'Investimentos', outros:'Outro' };

    el.innerHTML = `<div class="kanban">` + STAGES.map(s => `
      <div class="kanban-col">
        <div class="kanban-col-header">
          <span class="kanban-col-title" style="color:${s.color}">${s.label}</span>
          <span class="kanban-col-count">${byStage[s.id].length}</span>
        </div>
        <div class="kanban-items">
          ${byStage[s.id].map(l => `
            <div class="kanban-card" onclick="openLeadDetail('${l.id}')">
              <div class="kanban-card-name">${esc(l.name)}</div>
              <div class="kanban-card-phone">${fmt(l.phone)}</div>
              <div class="kanban-card-date">${objLabel[l.objective]||l.objective||''} · ${fmtDate(l.created_at)}</div>
            </div>`).join('')}
        </div>
      </div>`).join('') + `</div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`;
  }
}

async function openLeadDetail(id) {
  const stages = ['novo','contato','proposta','ganho','perdido'];
  const stageLabel = { novo:'Novo', contato:'Contato Feito', proposta:'Proposta', ganho:'Ganho', perdido:'Perdido' };
  const lead = await api('GET', `/leads?limit=1`).catch(() => null); // buscar pelo id não existe ainda — usar lista
  // Simple detail via prompt
  showModal('Editar Lead', `
    <div class="form-field"><label>Estágio</label>
      <select id="m-stage">
        ${stages.map(s=>`<option value="${s}">${stageLabel[s]}</option>`).join('')}
      </select>
    </div>
    <div class="form-field"><label>Anotações</label>
      <textarea id="m-notes" rows="4" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical"></textarea>
    </div>`,
    async () => {
      const stage = document.getElementById('m-stage').value;
      const notes = document.getElementById('m-notes').value;
      await api('PUT', `/leads/${id}`, { pipeline_stage: stage, notes });
      toast('Lead atualizado');
      renderPipeline();
    }
  );
}

// ── Prospects ─────────────────────────────────────────────────────────────────
let proState = { page: 1, search: '', status: '' };

async function renderProspects() {
  const el = document.getElementById('page-prospects');
  const tb = document.getElementById('topbar-actions');
  tb.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openAddProspect()">+ Adicionar Prospect</button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';

  try {
    const params = new URLSearchParams({ page: proState.page, limit: 50 });
    if (proState.search) params.set('search', proState.search);
    if (proState.status) params.set('status', proState.status);
    const data = await api('GET', `/prospects?${params}`);
    if (!data) return;

    const statusLabel = { novo:'Novo', enviado:'Enviado', respondido:'Respondido', agendado:'Agendado', convertido:'Convertido', perdido:'Perdido' };
    const badgeClass  = { novo:'badge-novo', enviado:'badge-enviado', respondido:'badge-respondido', agendado:'badge-agendado', convertido:'badge-convertido', perdido:'badge-perdido' };

    const rows = data.prospects.map(p => `
      <tr>
        <td><strong>${esc(p.name || p.company || '—')}</strong><br><span style="font-size:11px;color:var(--muted)">${esc(p.company||'')}</span></td>
        <td>${fmt(p.phone)}</td>
        <td>${esc(p.segment || '—')}</td>
        <td>${esc(p.city || '—')}</td>
        <td><span class="badge ${badgeClass[p.status]||'badge-novo'}">${statusLabel[p.status]||p.status}</span></td>
        <td>${fmtDate(p.created_at)}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="editProspect('${p.id}','${esc(p.status)}','${esc(p.notes||'')}','${esc(p.ai_message||'')}')">Editar</button>
        </td>
      </tr>`).join('');

    const statuses = Object.keys(statusLabel);
    el.innerHTML = `
      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-box" placeholder="Buscar..." value="${esc(proState.search)}"
            oninput="proState.search=this.value;proState.page=1;renderProspects()" />
          <select class="search-box" style="max-width:160px" onchange="proState.status=this.value;proState.page=1;renderProspects()">
            <option value="">Todos os status</option>
            ${statuses.map(s=>`<option value="${s}" ${proState.status===s?'selected':''}>${statusLabel[s]}</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:13px">${data.total} prospects</span>
        </div>
        <table>
          <thead><tr><th>Nome/Empresa</th><th>Telefone</th><th>Segmento</th><th>Cidade</th><th>Status</th><th>Criado</th><th></th></tr></thead>
          <tbody>${rows || '<tr><td colspan="7" class="empty">Nenhum prospect</td></tr>'}</tbody>
        </table>
        <div class="pagination">
          <span>Página ${data.page} de ${Math.max(1,Math.ceil(data.total/data.limit))}</span>
          <button class="btn btn-ghost btn-sm" onclick="proState.page=Math.max(1,proState.page-1);renderProspects()" ${data.page<=1?'disabled':''}>← Ant</button>
          <button class="btn btn-ghost btn-sm" onclick="proState.page++;renderProspects()" ${data.page*data.limit>=data.total?'disabled':''}>Próx →</button>
        </div>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`;
  }
}

function openAddProspect() {
  showModal('Adicionar Prospect', `
    <div class="form-row">
      <div class="form-field"><label>Nome</label><input id="m-name" placeholder="Nome ou responsável" /></div>
      <div class="form-field"><label>Empresa</label><input id="m-company" placeholder="Razão social" /></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Telefone *</label><input id="m-phone" placeholder="(11) 99999-9999" /></div>
      <div class="form-field"><label>E-mail</label><input id="m-email" placeholder="email@empresa.com" /></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Segmento</label><input id="m-segment" placeholder="Ex: Médico, Advogado..." /></div>
      <div class="form-field"><label>Cidade</label><input id="m-city" placeholder="Ex: São Paulo" /></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Site</label><input id="m-website" placeholder="https://..." /></div>
      <div class="form-field"><label>Instagram</label><input id="m-instagram" placeholder="@handle" /></div>
    </div>
    <div class="form-field"><label>Anotações</label>
      <textarea id="m-notes" rows="3" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical"></textarea>
    </div>`,
    async () => {
      const phone = document.getElementById('m-phone').value;
      if (!phone) { toast('Telefone obrigatório', 'error'); return; }
      await api('POST', '/prospects', {
        name: document.getElementById('m-name').value,
        company: document.getElementById('m-company').value,
        phone,
        email: document.getElementById('m-email').value,
        segment: document.getElementById('m-segment').value,
        city: document.getElementById('m-city').value,
        website: document.getElementById('m-website').value,
        instagram: document.getElementById('m-instagram').value,
        notes: document.getElementById('m-notes').value,
      });
      toast('Prospect adicionado!');
      renderProspects();
    }
  );
}

function editProspect(id, status, notes, aiMessage) {
  const statuses = ['novo','enviado','respondido','agendado','convertido','perdido'];
  const statusLabel = { novo:'Novo', enviado:'Enviado', respondido:'Respondido', agendado:'Agendado', convertido:'Convertido', perdido:'Perdido' };
  showModal('Editar Prospect', `
    <div class="form-field"><label>Status</label>
      <select id="m-status">
        ${statuses.map(s=>`<option value="${s}" ${status===s?'selected':''}>${statusLabel[s]}</option>`).join('')}
      </select>
    </div>
    <div class="form-field"><label>Mensagem enviada / rascunho</label>
      <textarea id="m-ai" rows="4" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical">${esc(aiMessage)}</textarea>
    </div>
    <div class="form-field"><label>Anotações</label>
      <textarea id="m-notes" rows="3" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical">${esc(notes)}</textarea>
    </div>`,
    async () => {
      await api('PUT', `/prospects/${id}`, {
        status: document.getElementById('m-status').value,
        ai_message: document.getElementById('m-ai').value,
        notes: document.getElementById('m-notes').value,
      });
      toast('Prospect atualizado!');
      renderProspects();
    }
  );
}

// ── Users ─────────────────────────────────────────────────────────────────────
async function renderUsers() {
  const el = document.getElementById('page-users');
  const tb = document.getElementById('topbar-actions');
  tb.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openAddUser()">+ Novo Usuário</button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const users = await api('GET', '/users');
    if (!users) return;
    const rows = users.map(u => `
      <tr>
        <td><strong>${esc(u.name)}</strong></td>
        <td>${esc(u.email)}</td>
        <td><span class="badge ${u.role==='master'?'badge-ganho':u.role==='admin'?'badge-contato':'badge-novo'}">${u.role}</span></td>
        <td><span class="badge ${u.status==='active'?'badge-ganho':'badge-perdido'}">${u.status}</span></td>
        <td>${fmtDate(u.created_at)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="changePassword('${u.id}')">Trocar senha</button></td>
      </tr>`).join('');
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Criado</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`;
  }
}

function openAddUser() {
  showModal('Novo Usuário', `
    <div class="form-field"><label>Nome</label><input id="m-name" /></div>
    <div class="form-field"><label>E-mail</label><input id="m-email" type="email" /></div>
    <div class="form-field"><label>Senha</label><input id="m-pwd" type="password" /></div>
    <div class="form-field"><label>Perfil</label>
      <select id="m-role"><option value="user">Usuário</option><option value="admin">Admin</option></select>
    </div>`,
    async () => {
      await api('POST', '/users', {
        name: document.getElementById('m-name').value,
        email: document.getElementById('m-email').value,
        password: document.getElementById('m-pwd').value,
        role: document.getElementById('m-role').value,
      });
      toast('Usuário criado!');
      renderUsers();
    }
  );
}

function changePassword(id) {
  showModal('Trocar Senha', `
    <div class="form-field"><label>Nova senha</label><input id="m-pwd" type="password" /></div>`,
    async () => {
      await api('PUT', `/users/${id}/password`, { password: document.getElementById('m-pwd').value });
      toast('Senha alterada!');
    }
  );
}

// ── Modal helper ──────────────────────────────────────────────────────────────
function showModal(title, bodyHtml, onConfirm) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${title}</span>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" id="modal-confirm">Salvar</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-confirm').onclick = async () => {
    try {
      await onConfirm();
      closeModal();
    } catch (e) { toast(e.message, 'error'); }
  };
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(phone) {
  const d = String(phone || '').replace(/\D/g,'');
  if (d.length === 11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  if (d.length === 10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return phone;
}
function fmtDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
if (state.token && state.user) {
  showApp();
}
