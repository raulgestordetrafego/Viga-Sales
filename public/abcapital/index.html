<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AB Capital — CRM</title>
<style>
  :root {
    --bg: #091929;
    --surface: #0e2540;
    --surface2: #153354;
    --border: #1e3d63;
    --accent: #c9a227;
    --accent2: #e8c04a;
    --text: #edf1f7;
    --muted: #7fa8cc;
    --danger: #ef4444;
    --success: #22c55e;
    --info: #3b82f6;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  button { cursor: pointer; border: none; outline: none; font-family: inherit; }
  input, select, textarea { font-family: inherit; }

  /* Login */
  #login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }

  /* Form */
  .form-field { margin-bottom: 16px; }
  .form-field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; transition: border .2s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline: none; border-color: var(--accent); }
  .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Toggle */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: .2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }
  .toggle-danger input:checked + .toggle-slider { background: var(--danger); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: .85; }
  .btn-success { background: var(--success); color: #0f1117; }
  .btn-success:hover { opacity: .9; }
  .btn-sm  { padding: 6px 14px; font-size: 13px; }
  .btn-full { width: 100%; justify-content: center; }

  /* Layout */
  #app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; font-size: 14px; color: var(--muted); cursor: pointer; transition: all .2s; border-left: 3px solid transparent; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); background: var(--surface2); border-left-color: var(--accent); }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #0f1117; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-role { font-size: 11px; color: var(--muted); text-transform: uppercase; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .page { flex: 1; overflow-y: auto; padding: 24px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-card.danger  { border-color: #7f1d1d; background: #1a0808; }
  .stat-card.success { border-color: #14532d; background: #081a0e; }
  .stat-card.warning { border-color: #78350f; background: #1a1008; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-value.danger  { color: var(--danger); }
  .stat-value.success { color: var(--success); }
  .stat-value.warning { color: var(--warning); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Progress */
  .progress-wrap { margin-top: 12px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .5s; }
  .progress-fill.over { background: var(--success); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-toolbar { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; text-align: left; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; flex: 1; min-width: 180px; }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .pagination { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }

  /* Badge */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

  /* Kanban */
  .kanban { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px; height: calc(100vh - 124px); }
  .kanban-col { flex: 0 0 260px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
  .kanban-col-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .kanban-col-title { font-size: 13px; font-weight: 600; }
  .kanban-col-count { font-size: 12px; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
  .kanban-items { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
  .kanban-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: grab; transition: border-color .2s, opacity .2s; }
  .kanban-card:hover { border-color: var(--accent); }
  .kanban-card.dragging { opacity: .4; cursor: grabbing; }
  .kanban-card.converted { border-left: 3px solid var(--success) !important; }
  .kanban-col.drag-over { background: rgba(201,162,39,.08); outline: 2px dashed var(--accent); outline-offset: -4px; }
  .kanban-card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .kanban-card-phone { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .kanban-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .kanban-tag { background: var(--surface2); border-radius: 4px; padding: 2px 6px; font-size: 11px; color: var(--muted); }
  .kanban-tag.success { background: #081a0e; color: #4ade80; }

  /* Stage bar */
  .stage-bar { display: flex; gap: 3px; margin: 8px 0; }
  .stage-step { flex: 1; height: 5px; border-radius: 3px; background: var(--border); }
  .stage-step.done { background: var(--accent); }
  .stage-step.won  { background: var(--success); }
  .stage-step.lost { background: var(--danger); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 640px; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-lg { max-width: 860px; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
  .section-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-top: 4px; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast-item { padding: 12px 18px; border-radius: 10px; font-size: 14px; animation: slideIn .3s ease; max-width: 320px; }
  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  .toast-success { background: #14532d; color: #4ade80; border: 1px solid #166534; }
  .toast-error   { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
  .toast-info    { background: #1e3a5f; color: #60a5fa; border: 1px solid #1d4ed8; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
  }
  .hidden { display: none !important; }
  .loading { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  .empty   { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
  select option { background: var(--surface); }
</style>
</head>
<body>
<div id="toast"></div>

<!-- Login -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/api/ab-capital/logo" alt="AB Capital" style="height:56px;object-fit:contain">
    </div>
    <h2 style="font-size:20px;margin-bottom:24px">Entrar</h2>
    <div class="form-field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" autocomplete="username" /></div>
    <div class="form-field"><label>Senha</label><input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" /></div>
    <div id="login-error" class="error-msg"></div>
    <button class="btn btn-primary btn-full" style="margin-top:20px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="/api/ab-capital/logo" alt="AB Capital" style="height:36px;object-fit:contain;display:block">
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="leads" onclick="navigate('leads')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads
      </div>
      <div class="nav-item" data-page="pipeline" onclick="navigate('pipeline')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Pipeline
      </div>
      <div class="nav-item" data-page="clientes" onclick="navigate('clientes')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.37a16 16 0 0 0 5.72 5.72l1.16-1.84a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 14.5"/></svg>
        Clientes
      </div>
      <div class="nav-item" data-page="prospects" onclick="navigate('prospects')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Prospecção
      </div>
      <div class="nav-item" data-page="users" onclick="navigate('users')" id="nav-users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Usuários
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%;justify-content:center" onclick="openChangePassword()">Trocar senha</button>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px;width:100%;justify-content:center" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="topbar-title">Dashboard</h1>
      <div id="topbar-actions"></div>
    </div>
    <div class="page"         id="page-dashboard"></div>
    <div class="page hidden"  id="page-leads"></div>
    <div class="page hidden"  id="page-pipeline"></div>
    <div class="page hidden"  id="page-clientes"></div>
    <div class="page hidden"  id="page-prospects"></div>
    <div class="page hidden"  id="page-users"></div>
  </div>
</div>

<div id="modal-container"></div>

<script>
// ── Constantes ─────────────────────────────────────────────────────────────────
const STAGES = [
  { id: 'analise',          label: 'Análise',          color: '#60a5fa' },
  { id: 'qualificacao',     label: 'Qualificação',     color: '#a78bfa' },
  { id: 'reuniao_agendada', label: 'Reunião Agendada', color: '#fbbf24' },
  { id: 'ganho',            label: 'Ganho',            color: '#4ade80' },
  { id: 'perdido',          label: 'Perdido',          color: '#f87171' },
];
const STAGE_MAP      = Object.fromEntries(STAGES.map(s => [s.id, s]));
const TRAFFIC_SOURCES = ['Instagram','Facebook','Google','Indicação','WhatsApp','Site','TikTok','YouTube','Outro'];
const ADMINISTRADORAS = [
  'Banco do Brasil',
  'Canopus',
  'Embracom',
  'Itaú',
  'Porto Seguro',
  'Remaza',
  'Santander',
  'Servopa',
];
const CLIENT_STATUS = { ativo:'Ativo', atraso:'Em Atraso', cancelado:'Cancelado', quitado:'Quitado' };

// ── State ──────────────────────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('ab_token') || null,
  user:  JSON.parse(localStorage.getItem('ab_user') || 'null'),
  page:  'dashboard',
};

// ── API ────────────────────────────────────────────────────────────────────────
const API = '/api/ab-capital';

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: 'Bearer ' + state.token } : {}) },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { doLogout(); return null; }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

async function apiUpload(path, formData) {
  const res = await fetch(API + path, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + state.token },
    body: formData,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erro no upload');
  return data;
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Auth ───────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const data = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    }).then(r => r.json());
    if (!data.token) { errEl.textContent = data.error || 'Erro ao entrar'; return; }
    state.token = data.token;
    state.user  = data.user;
    localStorage.setItem('ab_token', data.token);
    localStorage.setItem('ab_user', JSON.stringify(data.user));
    showApp();
  } catch (e) { errEl.textContent = e.message; }
}

function openChangePassword() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)this.remove()">
      <div class="modal" style="max-width:400px">
        <div class="modal-header"><span class="modal-title">Trocar senha</span><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
        <div class="modal-body">
          <div class="form-field"><label>Senha atual</label><input type="password" id="cp-current" /></div>
          <div class="form-field"><label>Nova senha</label><input type="password" id="cp-new" /></div>
          <div class="form-field"><label>Confirmar nova senha</label><input type="password" id="cp-confirm" /></div>
          <div id="cp-error" style="color:var(--danger);font-size:13px;margin-top:4px"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
          <button class="btn btn-primary" onclick="submitChangePassword()">Salvar</button>
        </div>
      </div>
    </div>`;
}

async function submitChangePassword() {
  const current = document.getElementById('cp-current').value;
  const newPwd  = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  const errEl   = document.getElementById('cp-error');
  if (newPwd !== confirm) { errEl.textContent = 'As senhas não coincidem'; return; }
  try {
    await api('POST', '/auth/change-password', { currentPassword: current, newPassword: newPwd });
    document.querySelector('.modal-overlay').remove();
    toast('Senha alterada com sucesso!');
  } catch (e) { errEl.textContent = e.message; }
}

function doLogout() {
  state.token = null; state.user = null;
  localStorage.removeItem('ab_token'); localStorage.removeItem('ab_user');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-page').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

function showApp() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  const u = state.user;
  document.getElementById('user-name').textContent   = u.name;
  document.getElementById('user-role').textContent   = u.role;
  document.getElementById('user-avatar').textContent = (u.name || '?')[0].toUpperCase();
  if (u.role !== 'master' && u.role !== 'admin') document.getElementById('nav-users').classList.add('hidden');
  navigate('dashboard');
}

// ── Navigation ─────────────────────────────────────────────────────────────────
const PAGE_TITLES = { dashboard:'Dashboard', leads:'Leads', pipeline:'Pipeline', clientes:'Clientes', prospects:'Prospecção Ativa', users:'Usuários' };

function navigate(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  if      (page === 'dashboard') renderDashboard();
  else if (page === 'leads')     renderLeads();
  else if (page === 'pipeline')  renderPipeline();
  else if (page === 'clientes')  renderClientes();
  else if (page === 'prospects') renderProspects();
  else if (page === 'users')     renderUsers();
}

// ── Dashboard ──────────────────────────────────────────────────────────────────
let dashFilters = { responsible: '', dateFrom: '', dateTo: '' };
let dashUsers   = [];

async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    // Busca usuários só na primeira vez
    if (!dashUsers.length) {
      dashUsers = await api('GET', '/users').catch(() => []) || [];
    }

    const q = new URLSearchParams();
    if (dashFilters.responsible) q.set('responsible', dashFilters.responsible);
    if (dashFilters.dateFrom)    q.set('date_from',   dashFilters.dateFrom);
    if (dashFilters.dateTo)      q.set('date_to',     dashFilters.dateTo);
    const qs = q.toString() ? '?' + q.toString() : '';

    const [stats, cStats] = await Promise.all([
      api('GET', `/leads/stats${qs}`),
      api('GET', `/clientes/stats${qs}`),
    ]);
    if (!stats || !cStats) return;
    const isMasterAdmin = state.user?.role === 'master' || state.user?.role === 'admin';

    // Label de contexto do filtro ativo
    const ctxParts = [];
    if (dashFilters.responsible) ctxParts.push(`👤 ${dashFilters.responsible}`);
    else ctxParts.push('👥 Todos os vendedores');
    if (dashFilters.dateFrom && dashFilters.dateTo)
      ctxParts.push(`📅 ${new Date(dashFilters.dateFrom+'T12:00').toLocaleDateString('pt-BR')} – ${new Date(dashFilters.dateTo+'T12:00').toLocaleDateString('pt-BR')}`);
    else if (dashFilters.dateFrom)
      ctxParts.push(`📅 A partir de ${new Date(dashFilters.dateFrom+'T12:00').toLocaleDateString('pt-BR')}`);
    else if (dashFilters.dateTo)
      ctxParts.push(`📅 Até ${new Date(dashFilters.dateTo+'T12:00').toLocaleDateString('pt-BR')}`);
    const hasFilter = dashFilters.responsible || dashFilters.dateFrom || dashFilters.dateTo;

    const userOpts = dashUsers.filter(u => u.status !== 'inactive')
      .map(u => `<option value="${u.name}" ${dashFilters.responsible===u.name?'selected':''}>${u.name}</option>`).join('');

    const stagesHtml = (stats.stages || []).map(s => {
      const st = STAGE_MAP[s.pipeline_stage];
      return `<tr><td style="color:${st?.color||'#fff'}">${st?.label||s.pipeline_stage}</td><td style="text-align:right;font-weight:600">${s.c}</td></tr>`;
    }).join('');

    el.innerHTML = `
      <!-- Barra de Filtros -->
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:180px">
          <span style="font-size:13px;color:var(--muted);white-space:nowrap;font-weight:500">👥 Vendedor</span>
          <select id="dash-responsible" onchange="dashFilters.responsible=this.value"
            style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;cursor:pointer">
            <option value="">Todos</option>
            ${userOpts}
          </select>
        </div>
        <div style="width:1px;height:28px;background:var(--border);flex-shrink:0"></div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--muted);font-weight:500">📅 Período</span>
          <input type="date" id="dash-date-from" value="${dashFilters.dateFrom}"
            onchange="dashFilters.dateFrom=this.value"
            style="background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;cursor:pointer">
          <span style="font-size:12px;color:var(--muted)">até</span>
          <input type="date" id="dash-date-to" value="${dashFilters.dateTo}"
            onchange="dashFilters.dateTo=this.value"
            style="background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;cursor:pointer">
        </div>
        <div style="display:flex;gap:8px;margin-left:auto">
          ${hasFilter ? `<button class="btn btn-ghost btn-sm" onclick="dashFilters={responsible:'',dateFrom:'',dateTo:''};renderDashboard()" style="font-size:12px">✕ Limpar</button>` : ''}
          <button class="btn btn-primary btn-sm" onclick="renderDashboard()">Aplicar</button>
        </div>
      </div>
      ${hasFilter ? `<div style="font-size:12px;color:var(--accent);margin-bottom:12px;font-weight:500">Visualizando: ${ctxParts.join(' · ')}</div>` : ''}

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Leads Ativos</div>
          <div class="stat-value">${stats.total_leads}</div>
          <div class="stat-sub">${stats.leads_today} hoje</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label">Clientes</div>
          <div class="stat-value success">${cStats.ativos || 0}</div>
          <div class="stat-sub">contratos ativos</div>
        </div>
        ${isMasterAdmin ? `
        <div class="stat-card ${cStats.em_atraso > 0 ? 'danger' : ''}">
          <div class="stat-label">⚠ Em Atraso</div>
          <div class="stat-value ${cStats.em_atraso > 0 ? 'danger' : ''}">${cStats.em_atraso || 0}</div>
          <div class="stat-sub">clientes inadimplentes</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Crédito Total</div>
          <div class="stat-value" style="font-size:20px">R$ ${fmtMoney(cStats.total_credit || 0)}</div>
          <div class="stat-sub">carteira de clientes</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label">Comissão Estimada</div>
          <div class="stat-value success" style="font-size:20px">R$ ${fmtMoney(cStats.total_commission || 0)}</div>
          <div class="stat-sub">média 4% do crédito</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">Saldo Devedor</div>
          <div class="stat-value warning" style="font-size:20px">R$ ${fmtMoney(cStats.remaining_balance || 0)}</div>
          <div class="stat-sub">parcelas restantes</div>
        </div>` : ''}
      </div>

      ${isMasterAdmin ? (() => {
        const creditTarget = 3_000_000;
        const commTarget   = creditTarget * 0.04;
        const creditPct    = Math.min((cStats.total_credit || 0) / creditTarget * 100, 100);
        const commPct      = Math.min((cStats.total_commission || 0) / commTarget * 100, 100);

        // Cor baseada em crédito contratado (não comissão)
        const color = creditPct >= 100 ? '#22c55e' : creditPct >= 70 ? '#f59e0b' : '#ef4444';

        function ring(pct, col, label, current, target) {
          const r = 52, circ = 2 * Math.PI * r;
          const dash = (pct / 100) * circ;
          const glow = col === '#22c55e' ? '0 0 18px #22c55e55' : col === '#f59e0b' ? '0 0 18px #f59e0b55' : '0 0 18px #ef444455';
          return `
            <div style="display:flex;flex-direction:column;align-items:center;gap:16px;flex:1">
              <div style="position:relative;width:140px;height:140px">
                <svg width="140" height="140" viewBox="0 0 120 120" style="transform:rotate(-90deg)">
                  <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--border)" stroke-width="10"/>
                  <circle cx="60" cy="60" r="${r}" fill="none" stroke="${col}" stroke-width="10"
                    stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
                    stroke-linecap="round"
                    style="filter:drop-shadow(${glow});transition:stroke-dasharray .6s ease"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">
                  <div style="font-size:22px;font-weight:800;color:${col};line-height:1">${pct.toFixed(0)}%</div>
                  <div style="font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px">${label}</div>
                </div>
              </div>
              <div style="text-align:center;width:100%">
                <div style="font-size:18px;font-weight:700;color:${col}">R$ ${fmtMoney(current)}</div>
                <div style="font-size:12px;color:var(--muted);margin-top:2px">de R$ ${fmtMoney(target)}</div>
                <div style="margin-top:10px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
                  <div style="height:100%;width:${pct.toFixed(1)}%;background:${col};border-radius:3px;transition:width .6s ease"></div>
                </div>
              </div>
            </div>`;
        }

        return `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
          <div class="stat-card" style="display:flex;flex-direction:column;gap:16px">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div>
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600">Meta de Vendas</div>
                <div style="font-size:13px;color:var(--muted);margin-top:2px">Crédito contratado</div>
              </div>
              <div style="font-size:11px;padding:4px 10px;border-radius:20px;background:${color}22;color:${color};font-weight:700">
                ${creditPct >= 100 ? '✓ Atingida' : creditPct >= 70 ? '↗ Em curso' : '↘ Abaixo'}
              </div>
            </div>
            ${ring(creditPct, color, 'vendas', cStats.total_credit || 0, creditTarget)}
          </div>
          <div class="stat-card" style="display:flex;flex-direction:column;gap:16px">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div>
                <div style="font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600">Resultado de Comissão</div>
                <div style="font-size:13px;color:var(--muted);margin-top:2px">4% do crédito contratado</div>
              </div>
              <div style="font-size:11px;padding:4px 10px;border-radius:20px;background:${color}22;color:${color};font-weight:700">
                R$ ${fmtMoney(commTarget)} meta
              </div>
            </div>
            ${ring(commPct, color, 'comissão', cStats.total_commission || 0, commTarget)}
          </div>
        </div>`;
      })() : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="table-wrap">
          <div style="padding:16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px">Leads por Estágio</div>
          <table><thead><tr><th>Estágio</th><th style="text-align:right">Qtd</th></tr></thead>
          <tbody>${stagesHtml || '<tr><td colspan="2" class="empty">Sem dados</td></tr>'}</tbody></table>
        </div>
        <div class="table-wrap">
          <div style="padding:16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px">Acesso Rápido</div>
          <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
            <button class="btn btn-primary"  onclick="navigate('pipeline')">Pipeline Kanban</button>
            <button class="btn btn-success"  onclick="navigate('clientes')">Ver Clientes</button>
            <button class="btn btn-ghost"    onclick="navigate('leads')">Ver Leads</button>
            <button class="btn btn-ghost"    onclick="navigate('prospects')">Prospecção Ativa</button>
          </div>
        </div>
      </div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

// ── Leads ──────────────────────────────────────────────────────────────────────
let leadsState = { page: 1, search: '', stage: '' };

async function renderLeads() {
  const el = document.getElementById('page-leads');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openNewLead()">+ Novo Lead</button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const params = new URLSearchParams({ page: leadsState.page, limit: 50 });
    if (leadsState.search) params.set('search', leadsState.search);
    if (leadsState.stage)  params.set('stage',  leadsState.stage);
    const data = await api('GET', `/leads?${params}`);
    if (!data) return;

    const rows = data.leads.map(l => {
      const st = STAGE_MAP[l.pipeline_stage] || STAGES[0];
      const avatar = l.photo_path
        ? `<img src="${l.photo_path}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border)">`
        : `<div style="width:32px;height:32px;border-radius:50%;background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:13px">${(l.name||'?')[0].toUpperCase()}</div>`;
      const converted = l.converted_to_client_id
        ? `<span class="badge" style="background:#081a0e;color:#4ade80;margin-left:6px">✓ Cliente</span>` : '';
      return `<tr style="cursor:pointer" onclick="openLeadSheet('${l.id}')">
        <td><div style="display:flex;align-items:center;gap:10px">${avatar}<div><strong>${esc(l.name)}</strong>${converted}</div></div></td>
        <td>${fmt(l.phone)}</td>
        <td>${esc(l.email||'—')}</td>
        <td>${l.consortium_name ? esc(l.consortium_name) : '—'}</td>
        <td>${l.credit_value ? 'R$ '+fmtMoney(l.credit_value) : '—'}</td>
        <td>${l.admin_company ? esc(l.admin_company) : '—'}</td>
        <td><span class="badge" style="background:${st.color}22;color:${st.color}">${st.label}</span></td>
        <td>${fmtDate(l.created_at)}</td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-box" placeholder="Buscar por nome, telefone..." value="${esc(leadsState.search)}"
            oninput="leadsState.search=this.value;leadsState.page=1;renderLeads()" />
          <select class="search-box" style="max-width:190px" onchange="leadsState.stage=this.value;leadsState.page=1;renderLeads()">
            <option value="">Todos os estágios</option>
            ${STAGES.map(s=>`<option value="${s.id}" ${leadsState.stage===s.id?'selected':''}>${s.label}</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:13px">${data.total} leads</span>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>WhatsApp</th><th>E-mail</th><th>Modalidade</th><th>Crédito</th><th>Administradora</th><th>Estágio</th><th>Criado</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="8" class="empty">Nenhum lead encontrado</td></tr>'}</tbody>
        </table>
        <div class="pagination">
          <span>Página ${data.page} de ${Math.max(1,Math.ceil(data.total/data.limit))}</span>
          <button class="btn btn-ghost btn-sm" onclick="leadsState.page=Math.max(1,leadsState.page-1);renderLeads()" ${data.page<=1?'disabled':''}>← Ant</button>
          <button class="btn btn-ghost btn-sm" onclick="leadsState.page++;renderLeads()" ${data.page*data.limit>=data.total?'disabled':''}>Próx →</button>
        </div>
      </div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

// ── Ficha de Lead (simplificada — sem campos de contrato) ──────────────────────
async function openLeadSheet(id) {
  const [lead, users] = await Promise.all([
    api('GET', `/leads/${id}`),
    api('GET', '/users').catch(() => []),
  ]);
  if (!lead) return;
  renderLeadSheetModal(lead, users || []);
}

function renderLeadSheetModal(lead, users = []) {
  const st       = STAGE_MAP[lead.pipeline_stage] || STAGES[0];
  const stageIdx = STAGES.findIndex(s => s.id === lead.pipeline_stage);
  const stageBar = STAGES.map((s, i) => {
    let cls = 'stage-step';
    if (i <= stageIdx) cls += s.id === 'ganho' ? ' won' : s.id === 'perdido' ? ' lost' : ' done';
    return `<div class="${cls}" title="${s.label}"></div>`;
  }).join('');

  const photoHtml = lead.photo_path
    ? `<img src="${lead.photo_path}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
    : `<span style="font-size:28px;font-weight:700;color:var(--accent)">${(lead.name||'?')[0].toUpperCase()}</span>`;

  const stageOptions   = STAGES.map(s => `<option value="${s.id}" ${lead.pipeline_stage===s.id?'selected':''}>${s.label}</option>`).join('');
  const trafficOptions = TRAFFIC_SOURCES.map(o => `<option value="${o}" ${lead.traffic_source===o?'selected':''}>${o}</option>`).join('');
  const admOptions     = ADMINISTRADORAS.map(o => `<option value="${o}" ${lead.admin_company===o?'selected':''}>${o}</option>`).join('');
  const leadUserOpts   = users.filter(u => u.status !== 'inactive').map(u => `<option value="${u.name}" ${lead.responsible===u.name?'selected':''}>${u.name}</option>`).join('');

  const convertedBanner = lead.converted_to_client_id ? `
    <div style="background:#081a0e;border:1px solid #14532d;border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span style="color:#4ade80;font-size:13px;font-weight:600">✓ Lead convertido em cliente</span>
      <button class="btn btn-success btn-sm" onclick="closeModal();navigate('clientes')">Ver Cliente →</button>
    </div>` : '';

  document.getElementById('modal-container').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal modal-lg">
      <div class="modal-header">
        <span class="modal-title">Ficha do Lead</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" style="padding:0">
        <div style="display:flex;align-items:center;gap:20px;padding:20px 24px;border-bottom:1px solid var(--border);background:var(--surface2)">
          <div style="width:72px;height:72px;border-radius:50%;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">${photoHtml}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:20px;font-weight:700;margin-bottom:4px">${esc(lead.name)}</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted)">
              <span>${fmt(lead.phone)}</span>
              ${lead.email ? `<span>${esc(lead.email)}</span>` : ''}
              ${lead.traffic_source ? `<span>📣 ${esc(lead.traffic_source)}</span>` : ''}
              ${lead.responsible ? `<span>👤 ${esc(lead.responsible)}</span>` : ''}
            </div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px">
              ${lead.created_at ? `<span>📅 Lead criado: ${new Date(lead.created_at).toLocaleDateString('pt-BR')}</span>` : ''}
              ${lead.won_at ? `<span>🏆 Fechamento: ${new Date(lead.won_at).toLocaleDateString('pt-BR')}</span>` : ''}
            </div>
            <div style="margin-top:10px">
              <div class="stage-bar">${stageBar}</div>
              <span class="badge" style="background:${st.color}22;color:${st.color}">${st.label}</span>
            </div>
          </div>
          <label class="btn btn-ghost btn-sm" style="cursor:pointer;flex-shrink:0">
            📷 Foto
            <input type="file" accept="image/*" style="display:none" onchange="uploadLeadFile('${lead.id}','photo',this)">
          </label>
        </div>

        <div style="padding:20px 24px;display:flex;flex-direction:column;gap:20px">
          ${convertedBanner}

          <div>

              <div class="form-field"><label>Nome Completo</label><input id="lf-name" value="${esc(lead.name||'')}" /></div>

                    <option value="">Selecionar...</option>
                    ${leadUserOpts}
                    ${lead.responsible && !users.find(u=>u.name===lead.responsible) ? `<option value="${esc(lead.responsible)}" selected>${esc(lead.responsible)}</option>` : ''}
                  </select>`
              }
            </div>
          </div>

          <div class="form-field">
            <label>Informações Gerais</label>
            <textarea id="lf-general_info" rows="3" style="resize:vertical">${esc(lead.general_info||'')}</textarea>
          </div>
          <div class="form-field">
            <label>Anotações</label>
            <textarea id="lf-notes" rows="3" style="resize:vertical">${esc(lead.notes||'')}</textarea>
          </div>

          <div>
            <div class="section-title">Documentos</div>
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
              ${lead.attachment_path
                ? `<a href="${lead.attachment_path}" target="_blank" class="btn btn-ghost btn-sm">📎 Ver Documento Anexado</a>`
                : `<span style="color:var(--muted);font-size:13px">Nenhum documento anexado</span>`
              }
              <label class="btn btn-ghost btn-sm" style="cursor:pointer">
                📁 ${lead.attachment_path ? 'Substituir' : 'Anexar Documento'}
                <input type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style="display:none"
                  onchange="uploadLeadFile('${lead.id}','attachment',this)">
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost"    onclick="closeModal()">Cancelar</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteLead('${lead.id}')">Excluir</button>
        <button class="btn btn-primary"  onclick="saveLeadSheet('${lead.id}')">Salvar</button>
      </div>
    </div>
  </div>`;
}

async function saveLeadSheet(id) {
  try {
    const g   = id => document.getElementById(id)?.value ?? '';
    const responsible = g('lf-responsible') || null; // null = mantém o valor atual no backend
    const body = {
      name:            g('lf-name'),
      phone:           g('lf-phone'),
      email:           g('lf-email'),
      address:         g('lf-address'),
      consortium_name: g('lf-consortium_name'),
      credit_value:    parseBRL(g('lf-credit_value')),
      admin_company:   g('lf-admin_company'),
      pipeline_stage:  g('lf-pipeline_stage'),
      traffic_source:  g('lf-traffic_source'),
      responsible,
      general_info:    g('lf-general_info'),
      notes:           g('lf-notes'),
      objective:       g('lf-objective'),
    };
    await api('PUT', `/leads/${id}`, body);

    // Auto-converte se estágio = ganho
    if (body.pipeline_stage === 'ganho') {
      await convertLeadToClient(id);
    } else {
      toast('Lead salvo!');
      closeModal();
      if (state.page === 'leads')    renderLeads();
      if (state.page === 'pipeline') renderPipeline();
    }
  } catch (e) { toast(e.message, 'error'); }
}

async function convertLeadToClient(leadId, extraData = {}) {
  try {
    const result = await api('POST', `/leads/${leadId}/convert`, {});
    if (!result) return;
    if (result.already_existed) {
      toast('Lead já convertido — abrindo ficha do cliente!', 'info');
    } else {
      toast('🎉 Lead convertido em cliente!');
    }
    closeModal();
    if (state.page === 'leads')    renderLeads();
    if (state.page === 'pipeline') renderPipeline();
    // Abre ficha do cliente para preencher contrato
    openClientSheet(result.cliente.id);
  } catch (e) { toast(e.message, 'error'); }
}

async function uploadLeadFile(id, field, input) {
  if (!input.files[0]) return;
  const fd = new FormData();
  fd.append(field, input.files[0]);
  toast('Enviando...', 'info');
  try {
    const updated = await apiUpload(`/leads/${id}/upload`, fd);
    toast('Arquivo enviado!');
    closeModal();
    renderLeadSheetModal(updated);
  } catch (e) { toast(e.message, 'error'); }
}

async function confirmDeleteLead(id) {
  if (!confirm('Excluir este lead?')) return;
  try {
    await api('DELETE', `/leads/${id}`);
    toast('Lead excluído');
    closeModal();
    renderLeads();
  } catch (e) { toast(e.message, 'error'); }
}

      <div class="form-field"><label>Estágio</label><select id="m-stage">${stageOpts}</select></div>

// ── Pipeline Kanban ────────────────────────────────────────────────────────────
let pipelineHideGanho = false;

function togglePipelineGanho() {
  pipelineHideGanho = !pipelineHideGanho;
  renderPipeline();
}

async function renderPipeline() {
  const el = document.getElementById('page-pipeline');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-ghost btn-sm" onclick="togglePipelineGanho()" title="${pipelineHideGanho ? 'Mostrar' : 'Ocultar'} coluna Ganho">
      ${pipelineHideGanho ? '👁 Mostrar Ganho' : '🙈 Ocultar Ganho'}
    </button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const all = await api('GET', '/leads?limit=500');
    if (!all) return;

    const visibleStages = pipelineHideGanho ? STAGES.filter(s => s.id !== 'ganho') : STAGES;
    const byStage = {};
    STAGES.forEach(s => { byStage[s.id] = []; });
    all.leads.forEach(l => {
      const key = byStage[l.pipeline_stage] ? l.pipeline_stage : STAGES[0].id;
      byStage[key].push(l);
    });

    el.innerHTML = `<div class="kanban">` + visibleStages.map(s => `
      <div class="kanban-col" data-stage="${s.id}"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="handleKanbanDrop(event,'${s.id}')">
        <div class="kanban-col-header" style="border-top:3px solid ${s.color}">
          <span class="kanban-col-title" style="color:${s.color}">${s.label}</span>
          <span class="kanban-col-count">${byStage[s.id].length}</span>
        </div>
        <div class="kanban-items">
          ${byStage[s.id].map(l => {
            const photo = l.photo_path
              ? `<img src="${l.photo_path?.replace(/^\/uploads\//,'/api/uploads/')}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border);float:right;margin-left:8px">`
              : '';
            return `<div class="kanban-card ${l.converted_to_client_id ? 'converted' : ''}"
              draggable="true" data-id="${l.id}"
              ondragstart="event.dataTransfer.setData('leadId','${l.id}');this.classList.add('dragging')"
              ondragend="this.classList.remove('dragging')"
              onclick="openLeadSheet('${l.id}')">
              ${photo}
              <div class="kanban-card-name">${esc(l.name)}</div>
              <div class="kanban-card-phone">${fmt(l.phone)}</div>
              <div class="kanban-card-tags">
                ${l.converted_to_client_id ? `<span class="kanban-tag success">✓ Cliente</span>` : ''}
                ${l.installment_value ? `<span class="kanban-tag">R$ ${fmtMoney(l.installment_value)}/mês</span>` : ''}
                ${l.admin_company ? `<span class="kanban-tag">${esc(l.admin_company)}</span>` : ''}
                ${l.traffic_source ? `<span class="kanban-tag">📣 ${esc(l.traffic_source)}</span>` : ''}
              </div>
              ${l.responsible ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">👤 ${esc(l.responsible)}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`).join('') + `</div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

async function handleKanbanDrop(event, targetStage) {
  event.preventDefault();
  const col = event.currentTarget;
  col.classList.remove('drag-over');
  const leadId = event.dataTransfer.getData('leadId');
  if (!leadId) return;
  try {
    await api('PUT', `/leads/${leadId}`, { pipeline_stage: targetStage });
    if (targetStage === 'ganho') {
      // Conversão automática ao arrastar para Ganho
      const result = await api('POST', `/leads/${leadId}/convert`, {});
      if (result && !result.already_existed) {
        toast('🎉 Lead convertido em cliente!');
        renderPipeline();
        openClientSheet(result.cliente.id);
        return;
      }
    }
    renderPipeline();
  } catch (e) { toast('Erro ao mover lead: ' + e.message, 'error'); }
}

            <div>
              <strong>${esc(c.name)}</strong>

            </div>
          </div>
        </td>
        <td>${fmt(c.phone)}</td>
        <td>${c.email ? esc(c.email) : '—'}</td>
        <td>
          <span style="display:inline-flex;align-items:center;gap:6px">
            <span style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600">${totalContratos}</span>

      </tr>`;

      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-box" placeholder="Buscar por nome, telefone, e-mail..." value="${esc(clientesState.search)}"
            oninput="clientesState.search=this.value;clientesState.page=1;renderClientes()" />
          <span style="color:var(--muted);font-size:13px">${data.total} clientes</span>
        </div>
        <table>
          <thead><tr><th>Nome</th><th>WhatsApp</th><th>E-mail</th><th>Contratos</th><th>Crédito Total</th><th>Cadastrado</th></tr></thead>

        </table>

          <button class="btn btn-ghost btn-sm" onclick="clientesState.page++;renderClientes()" ${data.page*data.limit>=data.total?'disabled':''}>Próx →</button>
        </div>
      </div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

async function openClientSheet(id) {
  const [c, users] = await Promise.all([
    api('GET', `/clientes/${id}`),
    api('GET', '/users').catch(() => []),
  ]);
  if (!c) return;
  renderClientSheetModal(c, users || []);
  // Carrega follow-ups após renderizar o modal
  loadFollowups(id);
}

// ── Follow-ups ────────────────────────────────────────────────────────────────

async function loadFollowups(clienteId) {
  const el = document.getElementById(`followups-list-${clienteId}`);
  if (!el) return;
  try {
    const rows = await api('GET', `/clientes/${clienteId}/followups`);
    if (!rows || rows.length === 0) {
      el.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:8px 0">Nenhum follow-up agendado.</div>`;
      return;
    }
    el.innerHTML = rows.map(f => {
      const isSent = f.status === 'sent';
      const date = f.scheduled_date ? new Date(f.scheduled_date + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:18px">${isSent ? '✅' : '🔔'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${date}${f.note ? ` — ${esc(f.note)}` : ''}</div>
            <div style="font-size:11px;color:var(--muted)">
              ${isSent ? `Lembrete enviado` : `Pendente`} · Por ${esc(f.created_by || '—')}
            </div>
          </div>
          ${!isSent ? `<button class="btn btn-danger btn-sm" onclick="deleteFollowup('${f.id}','${clienteId}')">✕</button>` : ''}
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div style="color:var(--muted);font-size:13px">Erro ao carregar follow-ups</div>`;
  }
}

function openNovoFollowup(clienteId, clienteName) {
  const today = new Date().toISOString().split('T')[0];
  showModal('Agendar Follow-up', `
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">
      Um lembrete será enviado no grupo da AB Capital no dia agendado.

    <div class="form-field">

      <input type="date" id="fu-date" min="${today}" value="${today}" />

  if (!confirm('Cancelar este follow-up?')) return;

async function saveClientSheet(id) {
  try {
    const g   = id => document.getElementById(id)?.value ?? '';
    const updated = await api('PUT', `/clientes/${id}`, {
      name:          g('cf-name'),
      phone:         g('cf-phone'),
      email:         g('cf-email'),
      cpf_cnpj:      g('cf-cpf_cnpj') || null,
      address:       g('cf-address'),
      responsible:   g('cf-responsible'),
      traffic_source:g('cf-traffic_source'),
      general_info:  g('cf-general_info'),
      notes:         g('cf-notes'),
    });
    toast('Cliente salvo!');
    closeModal();
    if (state.page === 'clientes') renderClientes();
    if (state.page === 'dashboard') renderDashboard();
    syncClientToSheets(updated).catch(() => {});
  } catch (e) { toast(e.message, 'error'); }
}

async function uploadClientFile(id, field, input) {
  if (!input.files[0]) return;
  const fd = new FormData();
  fd.append(field, input.files[0]);
  toast('Enviando...', 'info');
  try {
    const updated = await apiUpload(`/clientes/${id}/upload`, fd);
    toast('Arquivo enviado!');
    closeModal();
    renderClientSheetModal(updated);
  } catch (e) { toast(e.message, 'error'); }
}

function exportClientes(type) {
  const params = new URLSearchParams();
  if (clientesState.search) params.set('search', clientesState.search);
  window.location.href = `/api/ab-capital/export/${type}?${params}`;
}

// ── Google Sheets auto-sync ───────────────────────────────────────────────────
async function syncClientToSheets(cliente) {
  if (!cliente) return;
  try {
    const cfg = await api('GET', '/settings/sheets-webhook').catch(() => null);
    const webhookUrl = cfg?.webhook_url;
    if (!webhookUrl) return;
    await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cliente),
    });
  } catch (_) { /* silently ignore */ }
}

async function confirmDeleteCliente(id) {
  if (!confirm('Excluir este cliente e todos os seus contratos? Esta ação não pode ser desfeita.')) return;
  try {
    await api('DELETE', `/clientes/${id}`);
    toast('Cliente excluído');
    closeModal();
    renderClientes();
  } catch (e) { toast(e.message, 'error'); }
}

async function confirmDeleteContrato(contratoId, clienteId) {
  if (!confirm('Excluir este contrato?')) return;
  try {
    await api('DELETE', `/contratos/${contratoId}`);
    toast('Contrato excluído');
    // Recarrega a ficha do cliente
    const updated = await api('GET', `/clientes/${clienteId}`);
    if (updated) renderClientSheetModal(updated);
  } catch (e) { toast(e.message, 'error'); }
}

  const trafficOpts = TRAFFIC_SOURCES.map(o => `<option>${o}</option>`).join('');
  showModal('Novo Cliente', `

function ctCommCalc() {
  const credit = parseFloat(document.getElementById('ct-credit_value')?.value) || 0;
  const pct    = parseFloat(document.getElementById('ct-commission_pct')?.value) || 4;
  const el     = document.getElementById('ct-comm-calc');
  if (!el) return;
  el.textContent = credit > 0 ? `Comissão estimada: R$ ${fmtMoney(credit * pct / 100)}` : '';
}

function collectContratoBody() {
  const g = id => document.getElementById(id)?.value ?? '';
  const chk = id => document.getElementById(id)?.checked ?? false;
  return {
    admin_company:      g('ct-admin_company') || null,
    contrato:           g('ct-contrato') || null,
    grupo:              g('ct-grupo') || null,
    cota:               g('ct-cota') || null,
    empresa:            g('ct-empresa') || 'AB',
    credit_value:       g('ct-credit_value') ? Number(g('ct-credit_value')) : null,
    commission_pct:     g('ct-commission_pct') ? Number(g('ct-commission_pct')) : 4,
    installments:       g('ct-installments') ? Number(g('ct-installments')) : null,
    parcelas_pagas:     g('ct-parcelas_pagas') !== '' ? Number(g('ct-parcelas_pagas')) : 0,
    installment_value:  g('ct-installment_value') ? Number(g('ct-installment_value')) : null,
    data_adesao:        g('ct-data_adesao') || null,
    status:             g('ct-status') || 'ativo',
    status_atraso:      chk('ct-status_atraso'),
    status_cancelamento:chk('ct-status_cancelamento'),
    nf_emitida:         chk('ct-nf_emitida'),
    comissao_status:    g('ct-comissao_status') || 'pendente',
    comissao_valor:     g('ct-comissao_valor') ? Number(g('ct-comissao_valor')) : null,
    comissao_recebida:  g('ct-comissao_recebida') ? Number(g('ct-comissao_recebida')) : 0,
    data_boleto:        g('ct-data_boleto') || null,
    data_lance:         g('ct-data_lance') || null,
    parceria_pct:       g('ct-parceria_pct') ? Number(g('ct-parceria_pct')) : null,
    parceria_obs:       g('ct-parceria_obs') || null,
    notes:              g('ct-notes') || null,
  };
}

function openNovoContrato(clienteId) {
  showModal('Adicionar Contrato', contratoFormHtml(), async () => {
    const body = collectContratoBody();
    await api('POST', `/clientes/${clienteId}/contratos`, body);
    toast('Contrato adicionado!');
    const updated = await api('GET', `/clientes/${clienteId}`);
    if (updated) renderClientSheetModal(updated);
  });
  setTimeout(ctCommCalc, 50);
}

async function openContratoEdit(contratoId, clienteId) {
  try {
    const contratos = (await api('GET', `/clientes/${clienteId}`))?.contratos || [];
    const ct = contratos.find(c => c.id === contratoId);
    if (!ct) { toast('Contrato não encontrado', 'error'); return; }
    showModal('Editar Contrato', contratoFormHtml(ct), async () => {
      const body = collectContratoBody();
      await api('PUT', `/contratos/${contratoId}`, body);
      toast('Contrato salvo!');
      const updated = await api('GET', `/clientes/${clienteId}`);
      if (updated) renderClientSheetModal(updated);
    });
    setTimeout(ctCommCalc, 50);
  } catch (e) { toast(e.message, 'error'); }
}

// ── Prospects ──────────────────────────────────────────────────────────────────
let proState = { page: 1, search: '', status: '' };

async function renderProspects() {
  const el = document.getElementById('page-prospects');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openAddProspect()">+ Adicionar Prospect</button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const params = new URLSearchParams({ page: proState.page, limit: 50 });
    if (proState.search) params.set('search', proState.search);
    if (proState.status) params.set('status', proState.status);
    const data = await api('GET', `/prospects?${params}`);
    if (!data) return;
    const statusLabel = { novo:'Novo', enviado:'Enviado', respondido:'Respondido', agendado:'Agendado', convertido:'Convertido', perdido:'Perdido' };
    const rows = data.prospects.map(p => `
      <tr>
        <td><strong>${esc(p.name||p.company||'—')}</strong><br><span style="font-size:11px;color:var(--muted)">${esc(p.company||'')}</span></td>
        <td>${fmt(p.phone)}</td>
        <td>${esc(p.segment||'—')}</td>
        <td>${esc(p.city||'—')}</td>
        <td><span class="badge" style="background:var(--surface2);color:var(--muted)">${statusLabel[p.status]||p.status}</span></td>
        <td>${fmtDate(p.created_at)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="editProspect('${p.id}','${esc(p.status)}','${esc(p.notes||'')}','${esc(p.ai_message||'')}')">Editar</button></td>
      </tr>`).join('');
    el.innerHTML = `
      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="search-box" placeholder="Buscar..." value="${esc(proState.search)}"
            oninput="proState.search=this.value;proState.page=1;renderProspects()" />
          <select class="search-box" style="max-width:160px" onchange="proState.status=this.value;proState.page=1;renderProspects()">
            <option value="">Todos</option>
            ${Object.entries(statusLabel).map(([k,v])=>`<option value="${k}" ${proState.status===k?'selected':''}>${v}</option>`).join('')}
          </select>
          <span style="color:var(--muted);font-size:13px">${data.total} prospects</span>
        </div>
        <table>
          <thead><tr><th>Nome/Empresa</th><th>Telefone</th><th>Segmento</th><th>Cidade</th><th>Status</th><th>Criado</th><th></th></tr></thead>
          <tbody>${rows||'<tr><td colspan="7" class="empty">Nenhum prospect</td></tr>'}</tbody>
        </table>
        <div class="pagination">
          <span>Página ${data.page} de ${Math.max(1,Math.ceil(data.total/data.limit))}</span>
          <button class="btn btn-ghost btn-sm" onclick="proState.page=Math.max(1,proState.page-1);renderProspects()" ${data.page<=1?'disabled':''}>← Ant</button>
          <button class="btn btn-ghost btn-sm" onclick="proState.page++;renderProspects()" ${data.page*data.limit>=data.total?'disabled':''}>Próx →</button>
        </div>
      </div>`;
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

    <div class="form-row">
      <div class="form-field"><label>Telefone *</label><input id="m-phone" /></div>
      <div class="form-field"><label>E-mail</label><input id="m-email" /></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Segmento</label><input id="m-segment" /></div>
      <div class="form-field"><label>Cidade</label><input id="m-city" /></div>
    </div>
    <div class="form-field"><label>Anotações</label>
      <textarea id="m-notes" rows="3" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical"></textarea>
    </div>`,
    async () => {
      const phone = document.getElementById('m-phone').value;
      if (!phone) throw new Error('Telefone obrigatório');
      await api('POST', '/prospects', {
        name: document.getElementById('m-name').value, company: document.getElementById('m-company').value,
        phone, email: document.getElementById('m-email').value,
        segment: document.getElementById('m-segment').value, city: document.getElementById('m-city').value,
        notes: document.getElementById('m-notes').value,
      });
      toast('Prospect adicionado!');
      renderProspects();
    }
  );
}

function editProspect(id, status, notes, aiMessage) {
  const statusLabel = { novo:'Novo', enviado:'Enviado', respondido:'Respondido', agendado:'Agendado', convertido:'Convertido', perdido:'Perdido' };
  showModal('Editar Prospect', `
    <div class="form-field"><label>Status</label>
      <select id="m-status">${Object.entries(statusLabel).map(([k,v])=>`<option value="${k}" ${status===k?'selected':''}>${v}</option>`).join('')}</select>
    </div>
    <div class="form-field"><label>Mensagem enviada</label>
      <textarea id="m-ai" rows="4" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical">${esc(aiMessage)}</textarea>
    </div>
    <div class="form-field"><label>Anotações</label>
      <textarea id="m-notes" rows="3" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px;resize:vertical">${esc(notes)}</textarea>
    </div>`,
    async () => {
      await api('PUT', `/prospects/${id}`, {
        status: document.getElementById('m-status').value,
        ai_message: document.getElementById('m-ai').value,
        notes: document.getElementById('m-notes').value,
      });
      toast('Prospect atualizado!');
      renderProspects();
    }
  );
}

// ── Users ──────────────────────────────────────────────────────────────────────
async function renderUsers() {
  const el = document.getElementById('page-users');
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="openAddUser()">+ Novo Usuário</button>`;
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const users = await api('GET', '/users');
    if (!users) return;
    const rows = users.map(u => `
      <tr>
        <td><strong>${esc(u.name)}</strong></td>
        <td>${esc(u.email)}</td>
        <td><span class="badge" style="background:var(--surface2);color:var(--muted)">${u.role}</span></td>
        <td><span class="badge" style="background:${u.status==='active'?'#14532d':'#450a0a'};color:${u.status==='active'?'#4ade80':'#f87171'}">${u.status==='active'?'Ativo':'Inativo'}</span></td>
        <td>${fmtDate(u.created_at)}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="changeUserPassword('${u.id}')">Trocar senha</button>
          <button class="btn btn-ghost btn-sm" style="margin-left:4px" onclick="toggleUserStatus('${u.id}','${u.status}')">${u.status==='active'?'Desativar':'Ativar'}</button>
        </td>
      </tr>`).join('');
    el.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Criado</th><th>Ações</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="margin-top:16px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-size:13px;color:var(--muted)">
        <strong style="color:var(--text)">Perfis:</strong>
        <span style="margin-left:12px"><strong style="color:var(--accent)">Master</strong> — acesso total + configurações</span>
        <span style="margin-left:12px"><strong style="color:var(--info)">Admin</strong> — vê todos os leads e clientes</span>
        <span style="margin-left:12px"><strong style="color:var(--muted)">Usuário</strong> — vê apenas próprios leads/clientes</span>
      </div>
      <div id="sheets-config-panel" style="margin-top:16px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px">
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px">🔗 Google Sheets — Sincronização Automática</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Ao salvar um cliente, os dados são enviados automaticamente para o webhook n8n abaixo, que grava na planilha do Google Sheets.</div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <div style="flex:1"><label style="font-size:12px;color:var(--muted);font-weight:500;display:block;margin-bottom:4px">URL do Webhook n8n</label>
            <input id="sheets-webhook-input" type="url" placeholder="https://n8n.exemplo.com/webhook/abc123" style="width:100%;box-sizing:border-box" />
          </div>
          <button class="btn btn-primary btn-sm" onclick="saveSheetsWebhook()">Salvar</button>
        </div>
        <div id="sheets-webhook-status" style="font-size:11px;color:var(--muted);margin-top:8px"></div>
      </div>`;
    loadSheetsWebhookConfig();
  } catch (e) { el.innerHTML = `<div class="empty">Erro: ${e.message}</div>`; }
}

function openAddUser() {
  showModal('Novo Usuário', `
    <div class="form-field"><label>Nome</label><input id="m-name" /></div>
    <div class="form-field"><label>E-mail</label><input id="m-email" type="email" /></div>
    <div class="form-field"><label>Senha</label><input id="m-pwd" type="password" /></div>
    <div class="form-field"><label>Perfil</label>
      <select id="m-role">
        <option value="user">Usuário (vê apenas próprios leads/clientes)</option>
        <option value="admin">Admin (vê todos)</option>
      </select>
    </div>`,
    async () => {
      await api('POST', '/users', {
        name:     document.getElementById('m-name').value,
        email:    document.getElementById('m-email').value,
        password: document.getElementById('m-pwd').value,
        role:     document.getElementById('m-role').value,
      });
      toast('Usuário criado!');
      renderUsers();
    }
  );
}

function changeUserPassword(id) {
  showModal('Trocar Senha', `
    <div class="form-field"><label>Nova senha</label><input id="m-pwd" type="password" /></div>`,
    async () => {
      await api('PUT', `/users/${id}/password`, { password: document.getElementById('m-pwd').value });
      toast('Senha alterada!');
    }
  );
}

async function saveSheetsWebhook() {
  const url = document.getElementById('sheets-webhook-input')?.value?.trim();
  if (!url) return;
  try {
    const r = await api('PUT', '/settings/sheets-webhook', { webhook_url: url });
    document.getElementById('sheets-webhook-status').textContent = '✅ Salvo! ' + (r?.note || '');
    toast('Webhook salvo!');
  } catch (e) { toast(e.message, 'error'); }
}

async function loadSheetsWebhookConfig() {
  try {
    const cfg = await api('GET', '/settings/sheets-webhook');
    const inp = document.getElementById('sheets-webhook-input');
    const st  = document.getElementById('sheets-webhook-status');
    if (!inp) return;
    if (cfg?.webhook_url) {
      inp.value = cfg.webhook_url;
      st.textContent = '✅ Webhook configurado';
    } else {
      st.textContent = '⚠️ Nenhum webhook configurado — dados não serão sincronizados automaticamente';
    }
  } catch (_) {}
}

async function toggleUserStatus(id, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
  if (!confirm(`${newStatus === 'inactive' ? 'Desativar' : 'Ativar'} este usuário?`)) return;
  try {
    await api('PUT', `/users/${id}/status`, { status: newStatus });
    toast('Status atualizado!');
    renderUsers();
  } catch (e) { toast(e.message, 'error'); }
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function showModal(title, bodyHtml, onConfirm) {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${title}</span>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" id="modal-confirm">Salvar</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-confirm').onclick = async () => {
    try { await onConfirm(); closeModal(); }
    catch (e) { toast(e.message, 'error'); }
  };
}

function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

// ── Utils ──────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(phone) {
  const d = String(phone||'').replace(/\D/g,'');
  if (d.length===11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  if (d.length===10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return phone;
}
function fmtDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('pt-BR') + ' ' + new Date(str).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}
function fmtMoney(val) {
  return Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function formatBRL(val) {
  if (!val && val !== 0) return '';
  return 'R$ ' + Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function parseBRL(str) {
  if (!str) return null;
  const n = Number(String(str).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.'));
  return isNaN(n) ? null : n;
}
function maskBRL(input) {
  let v = input.value.replace(/\D/g,'');
  if (!v) { input.value = ''; return; }
  v = (parseInt(v,10)/100).toFixed(2);
  input.value = 'R$ ' + parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── Boot ───────────────────────────────────────────────────────────────────────
if (state.token && state.user) showApp();
</script>
