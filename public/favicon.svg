<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background navy escuro -->
  <rect width="64" height="64" rx="14" fill="#07101e"/>

  <!-- Cubo laranja no topo -->
  <!-- Face superior (mais clara) -->
  <polygon points="32,7 50,16 32,25 14,16" fill="#F5A830"/>
  <!-- Face frontal esquerda -->
  <polygon points="14,16 32,25 32,38 14,29" fill="#C07518"/>
  <!-- Face frontal direita (um tom entre) -->
  <polygon points="50,16 32,25 32,38 50,29" fill="#D98920"/>

  <!-- Coluna navy abaixo do cubo -->
  <!-- Face esquerda (frente) -->
  <polygon points="14,29 32,38 32,58 14,49" fill="#1E4A82"/>
  <!-- Face direita (lado) -->
  <polygon points="50,29 32,38 32,58 50,49" fill="#0c2244"/>
</svg>
